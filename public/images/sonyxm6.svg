<svg width="1000" height="1000" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1C1C1C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#333333;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="screenGlow" cx="50%" cy="30%" r="60%">
      <stop offset="0%" style="stop-color:#FF6600;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0" />
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FF6600;stop-opacity:0.12" />
      <stop offset="100%" style="stop-color:#FF6600;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="1000" fill="url(#bg)"/>
  
  <!-- Subtle glow -->
  <ellipse cx="250" cy="220" rx="200" ry="180" fill="url(#glow)"/>
  
  <!-- Device shape -->
  
        <!-- Headphone arc -->
        <path d="M 130 220 Q 130 100 250 100 Q 370 100 370 220" 
              stroke="#333333" stroke-width="22" fill="none" stroke-linecap="round"/>
        <!-- Left cup -->
        <ellipse cx="130" cy="235" rx="42" ry="52" fill="#333333" stroke="#FF660033" stroke-width="1.5"/>
        <ellipse cx="130" cy="235" rx="30" ry="38" fill="#111111"/>
        <circle cx="130" cy="235" r="16" fill="#FF660033"/>
        <!-- Right cup -->
        <ellipse cx="370" cy="235" rx="42" ry="52" fill="#333333" stroke="#FF660033" stroke-width="1.5"/>
        <ellipse cx="370" cy="235" rx="30" ry="38" fill="#111111"/>
        <circle cx="370" cy="235" r="16" fill="#FF660033"/>
        <!-- Headband padding -->
        <path d="M 155 170 Q 250 120 345 170" 
              stroke="#FF660044" stroke-width="12" fill="none" stroke-linecap="round"/>
      
  
  <!-- Brand name -->
  <text x="250" y="390" 
    font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif"
    font-size="13" font-weight="500" letter-spacing="2"
    fill="#FF6600" opacity="0.9" text-anchor="middle"
    text-rendering="optimizeLegibility">SONY</text>
  
  <!-- Device name -->
  <text x="250" y="415"
    font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif"
    font-size="17" font-weight="600" letter-spacing="0.3"
    fill="#FFFFFF" opacity="0.95" text-anchor="middle"
    text-rendering="optimizeLegibility">Sony WH-1000XM6</text>
</svg>