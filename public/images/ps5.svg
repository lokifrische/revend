<svg width="1000" height="1000" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#003087;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#006FBC;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="screenGlow" cx="50%" cy="30%" r="60%">
      <stop offset="0%" style="stop-color:#00AEEF;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0" />
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00AEEF;stop-opacity:0.12" />
      <stop offset="100%" style="stop-color:#00AEEF;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="1000" fill="url(#bg)"/>
  
  <!-- Subtle glow -->
  <ellipse cx="250" cy="220" rx="200" ry="180" fill="url(#glow)"/>
  
  <!-- Device shape -->
  
        <!-- PS5 silhouette -->
        <ellipse cx="250" cy="215" rx="100" ry="145" fill="#006FBC" stroke="#00AEEF22" stroke-width="1"/>
        <ellipse cx="250" cy="215" rx="75" ry="110" fill="#003087"/>
        <!-- Disc slot -->
        <rect x="175" y="200" width="150" height="4" rx="2" fill="#00AEEF66"/>
        <!-- Power button -->
        <circle cx="250" cy="155" r="8" fill="#00AEEF88" stroke="#00AEEF" stroke-width="1.5"/>
        <!-- USB ports -->
        <rect x="225" y="280" width="12" height="6" rx="2" fill="#00AEEF55"/>
        <rect x="263" y="280" width="12" height="6" rx="2" fill="#00AEEF55"/>
      
  
  <!-- Brand name -->
  <text x="250" y="390" 
    font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif"
    font-size="13" font-weight="500" letter-spacing="2"
    fill="#00AEEF" opacity="0.9" text-anchor="middle"
    text-rendering="optimizeLegibility">SONY</text>
  
  <!-- Device name -->
  <text x="250" y="415"
    font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif"
    font-size="17" font-weight="600" letter-spacing="0.3"
    fill="#FFFFFF" opacity="0.95" text-anchor="middle"
    text-rendering="optimizeLegibility">PlayStation 5</text>
</svg>