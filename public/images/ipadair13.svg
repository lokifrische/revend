<svg width="1000" height="1000" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1C1C1E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2C2C2E;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="screenGlow" cx="50%" cy="30%" r="60%">
      <stop offset="0%" style="stop-color:#0071E3;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0" />
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#0071E3;stop-opacity:0.12" />
      <stop offset="100%" style="stop-color:#0071E3;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="1000" fill="url(#bg)"/>
  
  <!-- Subtle glow -->
  <ellipse cx="250" cy="220" rx="200" ry="180" fill="url(#glow)"/>
  
  <!-- Device shape -->
  
        <!-- iPad silhouette -->
        <rect x="145" y="60" width="210" height="280" rx="18" ry="18" fill="#2C2C2E" stroke="#0071E322" stroke-width="1"/>
        <rect x="155" y="78" width="190" height="245" rx="4" ry="4" fill="#111"/>
        <circle cx="250" cy="330" r="8" fill="#0071E344" stroke="#0071E388" stroke-width="1"/>
        <rect x="155" y="78" width="190" height="245" rx="4" ry="4" fill="#1C1C1E11"/>
        <!-- Screen glow -->
        <rect x="160" y="83" width="180" height="230" rx="3" ry="3" fill="url(#screenGlow)"/>
      
  
  <!-- Brand name -->
  <text x="250" y="390" 
    font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif"
    font-size="13" font-weight="500" letter-spacing="2"
    fill="#0071E3" opacity="0.9" text-anchor="middle"
    text-rendering="optimizeLegibility">APPLE</text>
  
  <!-- Device name -->
  <text x="250" y="415"
    font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif"
    font-size="17" font-weight="600" letter-spacing="0.3"
    fill="#FFFFFF" opacity="0.95" text-anchor="middle"
    text-rendering="optimizeLegibility">iPad Air 13"</text>
</svg>