<svg width="1000" height="1000" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E60012;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C0000F;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="screenGlow" cx="50%" cy="30%" r="60%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0" />
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.12" />
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="1000" fill="url(#bg)"/>
  
  <!-- Subtle glow -->
  <ellipse cx="250" cy="220" rx="200" ry="180" fill="url(#glow)"/>
  
  <!-- Device shape -->
  
        <!-- Nintendo Switch silhouette -->
        <!-- Left Joy-Con -->
        <rect x="80" y="120" width="70" height="160" rx="30" ry="30" fill="#FFFFFF22" stroke="#FFFFFF55" stroke-width="1.5"/>
        <!-- Right Joy-Con -->
        <rect x="350" y="120" width="70" height="160" rx="30" ry="30" fill="#FFFFFF22" stroke="#FFFFFF55" stroke-width="1.5"/>
        <!-- Main body -->
        <rect x="145" y="100" width="210" height="200" rx="6" ry="6" fill="#C0000F"/>
        <!-- Screen -->
        <rect x="155" y="112" width="190" height="176" rx="4" ry="4" fill="#0D0D0D"/>
        <rect x="158" y="115" width="184" height="170" rx="3" ry="3" fill="url(#screenGlow)"/>
        <!-- Joy-Con buttons -->
        <circle cx="115" cy="165" r="7" fill="#E60012" stroke="#FFFFFF88" stroke-width="1.5"/>
        <circle cx="385" cy="165" r="7" fill="#E60012" stroke="#FFFFFF88" stroke-width="1.5"/>
      
  
  <!-- Brand name -->
  <text x="250" y="390" 
    font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif"
    font-size="13" font-weight="500" letter-spacing="2"
    fill="#FFFFFF" opacity="0.9" text-anchor="middle"
    text-rendering="optimizeLegibility">NINTENDO</text>
  
  <!-- Device name -->
  <text x="250" y="415"
    font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif"
    font-size="17" font-weight="600" letter-spacing="0.3"
    fill="#FFFFFF" opacity="0.95" text-anchor="middle"
    text-rendering="optimizeLegibility">Nintendo Switch 2</text>
</svg>